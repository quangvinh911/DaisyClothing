      <path d="M 50 50 C 48 50, 45 37, 48 22 C 49 15, 51 15, 52 22 C 55 37, 52 50, 50 50 Z" fill="url(#petalGradBack)" stroke="#B87B57" stroke-width="1.1" transform="rotate(85, 50, 50)" />
      <path d="M 50 50 C 48 50, 45 37, 48 22 C 49 15, 51 15, 52 22 C 55 37, 52 50, 50 50 Z" fill="url(#petalGradBack)" stroke="#B87B57" stroke-width="1.1" transform="rotate(120, 50, 50)" />
      <path d="M 50 50 C 48 50, 45 37, 48 22 C 49 15, 51 15, 52 22 C 55 37, 52 50, 50 50 Z" fill="url(#petalGradBack)" stroke="#B87B57" stroke-width="1.1" transform="rotate(155, 50, 50)" />
      <path d="M 50 50 C 48 50, 45 37, 48 22 C 49 15, 51 15, 52 22 C 55 37, 52 50, 50 50 Z" fill="url(#petalGradBack)" stroke="#B87B57" stroke-width="1.1" transform="rotate(188, 50, 50)" />
      <path d="M 50 50 C 48 50, 45 37, 48 22 C 49 15, 51 15, 52 22 C 55 37, 52 50, 50 50 Z" fill="url(#petalGradBack)" stroke="#B87B57" stroke-width="1.1" transform="rotate(222, 50, 50)" />
      <path d="M 50 50 C 48 50, 45 37, 48 22 C 49 15, 51 15, 52 22 C 55 37, 52 50, 50 50 Z" fill="url(#petalGradBack)" stroke="#B87B57" stroke-width="1.1" transform="rotate(254, 50, 50)" />
      <path d="M 50 50 C 48 50, 45 37, 48 22 C 49 15, 51 15, 52 22 C 55 37, 52 50, 50 50 Z" fill="url(#petalGradBack)" stroke="#B87B57" stroke-width="1.1" transform="rotate(288, 50, 50)" />
      <path d="M 50 50 C 48 50, 45 37, 48 22 C 49 15, 51 15, 52 22 C 55 37, 52 50, 50 50 Z" fill="url(#petalGradBack)" stroke="#B87B57" stroke-width="1.1" transform="rotate(320, 50, 50)" />
      <path d="M 50 50 C 48 50, 45 37, 48 22 C 49 15, 51 15, 52 22 C 55 37, 52 50, 50 50 Z" fill="url(#petalGradBack)" stroke="#B87B57" stroke-width="1.1" transform="rotate(352, 50, 50)" />
    </g>

    {/* Foreground Petals */}
