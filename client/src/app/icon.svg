      <path d="M 50 50 C 47 50, 44 34, 47 17 C 49 10, 51 10, 53 17 C 56 34, 53 50, 50 50 Z" fill="url(#petalGrad)" stroke="#9E6840" stroke-width="1.2" transform="rotate(0, 50, 50)" />
      <path d="M 50 50 C 47 50, 44 34, 47 17 C 49 10, 51 10, 53 17 C 56 34, 53 50, 50 50 Z" fill="url(#petalGrad)" stroke="#9E6840" stroke-width="1.2" transform="rotate(35, 50, 50)" />
