<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="centerGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stopColor="#FFF2A8" />
      <stop offset="50%" stopColor="#E5A638" />
      <stop offset="100%" stopColor="#A66814" />
    </radialGradient>
    <linearGradient id="petalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stopColor="#FFFFFF" />
      <stop offset="100%" stopColor="#F7EBE1" />
    </linearGradient>
    <linearGradient id="petalGradBack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stopColor="#F0D5C3" />
      <stop offset="100%" stopColor="#D9AA8F" />
    </linearGradient>
  </defs>

  {/* Soft cream background circle with a gold border */}
  <circle cx="50" cy="50" r="46" fill="#FAF7F2" stroke="#B87B57" stroke-width="2.5" />

  {/* Group of petals rotated around (50, 50) */}
  <g>
    {/* Background Petals */}
    <g opacity="0.95">
      <path d="M 50 50 C 48 50, 45 37, 48 22 C 49 15, 51 15, 52 22 C 55 37, 52 50, 50 50 Z" fill="url(#petalGradBack)" stroke="#B87B57" stroke-width="1.1" transform="rotate(18, 50, 50)" />
