      <path d="M 50 50 C 47 50, 44 34, 47 17 C 49 10, 51 10, 53 17 C 56 34, 53 50, 50 50 Z" fill="url(#petalGrad)" stroke="#9E6840" stroke-width="1.2" transform="rotate(102, 50, 50)" />
      <path d="M 50 50 C 47 50, 44 34, 47 17 C 49 10, 51 10, 53 17 C 56 34, 53 50, 50 50 Z" fill="url(#petalGrad)" stroke="#9E6840" stroke-width="1.2" transform="rotate(138, 50, 50)" />
      <path d="M 50 50 C 47 50, 44 34, 47 17 C 49 10, 51 10, 53 17 C 56 34, 53 50, 50 50 Z" fill="url(#petalGrad)" stroke="#9E6840" stroke-width="1.2" transform="rotate(170, 50, 50)" />
      <path d="M 50 50 C 47 50, 44 34, 47 17 C 49 10, 51 10, 53 17 C 56 34, 53 50, 50 50 Z" fill="url(#petalGrad)" stroke="#9E6840" stroke-width="1.2" transform="rotate(204, 50, 50)" />
      <path d="M 50 50 C 47 50, 44 34, 47 17 C 49 10, 51 10, 53 17 C 56 34, 53 50, 50 50 Z" fill="url(#petalGrad)" stroke="#9E6840" stroke-width="1.2" transform="rotate(238, 50, 50)" />
      <path d="M 50 50 C 47 50, 44 34, 47 17 C 49 10, 51 10, 53 17 C 56 34, 53 50, 50 50 Z" fill="url(#petalGrad)" stroke="#9E6840" stroke-width="1.2" transform="rotate(272, 50, 50)" />
      <path d="M 50 50 C 47 50, 44 34, 47 17 C 49 10, 51 10, 53 17 C 56 34, 53 50, 50 50 Z" fill="url(#petalGrad)" stroke="#9E6840" stroke-width="1.2" transform="rotate(305, 50, 50)" />
      <path d="M 50 50 C 47 50, 44 34, 47 17 C 49 10, 51 10, 53 17 C 56 34, 53 50, 50 50 Z" fill="url(#petalGrad)" stroke="#9E6840" stroke-width="1.2" transform="rotate(338, 50, 50)" />
    </g>
  </g>

  {/* Center Golden/Yellow Disc */}
  <circle cx="50" cy="50" r="9" fill="url(#centerGrad)" stroke="#8C550A" stroke-width="1.2" />
  
  {/* Detailed artistic dots for texture/pollen */}
  <circle cx="48" cy="47" r="1.3" fill="#FFFFFF" opacity="0.9" />
  <circle cx="51" cy="46" r="0.9" fill="#FFF2A8" opacity="0.8" />
  <circle cx="46" cy="50" r="0.9" fill="#7A4807" opacity="0.5" />
  <circle cx="52" cy="52" r="0.7" fill="#7A4807" opacity="0.6" />
  <circle cx="49" cy="54" r="0.8" fill="#7A4807" opacity="0.4" />
</svg>
